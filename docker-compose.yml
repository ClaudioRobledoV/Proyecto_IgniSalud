# Este archivo nos permite levantar una base de datos PostgreSQL fácilmente mediante Docker.
# Es ideal para no ensuciar la computadora instalando programas directamente.


version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: ignisalud_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres # La misma que pusimos en el .env
      POSTGRES_DB: ignisalud
    ports:
      - "5433:5432" # Expone el puerto 5433 (para evitar choques con instalaciones locales)
    volumes:
      - pgdata:/var/lib/postgresql/data # Guarda los datos permanentemente aunque el contenedor se apague

  backend:
    build: ./backend
    container_name: ignisalud_backend
    restart: always
    ports:
      - "4001:4000"
    volumes:
      # Montamos el código fuente para usar nodemon (reinicio automático)
      - ./backend:/app
      # Protegemos los módulos instalados internamente en Linux
      - /app/node_modules
    env_file:
      - ./backend/.env
    depends_on:
      - postgres

volumes:
  pgdata:
